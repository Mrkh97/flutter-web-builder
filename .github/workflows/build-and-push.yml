name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build-and-push.yml
  workflow_dispatch:
    inputs:
      version:
        description: "Single Flutter version to build (leave blank to build all matrix versions)"
        required: false
        type: string

jobs:
  set-matrix:
    name: Compute version matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.compute.outputs.versions }}
    steps:
      - id: compute
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${MANUAL_VERSION}" ]; then
            printf 'versions=["%s"]\n' "${MANUAL_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo 'versions=["3.41.9"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & push ${{ matrix.version }}
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.set-matrix.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          build-args: |
            FLUTTER_VERSION=${{ matrix.version }}
          tags: mrkh97/flutter-web-builder:${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
